about-section:
  title: Get Everything Works Great – Let WalksCloud Be Your IT Partner
  intro:
    - We deliver comprehensive MIS services that fulfill hardware, software, and network operations needs.
    - Focus on expanding your business while we take care of information management and daily operations.
    - Save more than 60% of existing manual processes so we can create maximum value together.
  about-items:
    - title: Comprehensive IT/MIS Hosting - Focus on Your Core Business
      content: Professional IT managed services and outsourcing (IT-BPO) with expert consulting covering MIS operations, network architecture, equipment management, account management, and system maintenance to help enterprises lower IT upkeep costs.
    - title: Information Security Management - Safeguard Your Operations
      content: Provide multi-layered protections that block malicious attacks, data leaks, and unauthorized access.
    - title: Digital Device Management - Monitor Assets and Block Malware in Real Time
      content: Help you manage hardware and software assets effectively to secure every device and application.
  questions-block:
    title: |
      Problems and Scenarios We Can Solve
    intro: |
      As HR, administrative, or IT staff, you may be facing:
    items:
      - icon: material-symbols:mobile-lock-portrait
        title: Too many device types and volumes to manage consistently?
        content: Rolling out an enterprise MDM centralizes macOS, iOS, and Windows fleets so you can inventory devices, push policies, and enforce security from one console.
      - icon: lucide:brick-wall-shield
        title: Worried about the security of your remote work environment and unauthorized access?
        content: We deliver enterprise-grade VPN solutions that secure remote connections and reinforce hybrid work reliability.
      - icon: material-symbols:engineering
        title: No in-house IT staff and unsure how to resolve technical issues?
        content: We provide IT hosting and technical support to keep your IT environment stable while lowering management costs.
      - icon: material-symbols:build
        title: Complex IT maintenance is reducing overall business efficiency?
        content: We offer IT monitoring, automated management, and cloud virtualization to simplify maintenance and boost IT operations.
      - icon: lucide:laptop
        title: Onboarding or offboarding accounts is tedious, and employee assets stay unclear?
        content: Our device management system centralizes assets and monitors for malware intrusions so you can manage hardware and software in real time.
      - icon: material-symbols:passkey
        title: Asset and account permissions are messy and difficult to control?
        content: Enterprise asset management and IAM systems automate device and account permissions, reducing human error and lost assets.
      - icon: material-symbols:modeling
        title: Digital transformation is slow and the IT architecture cannot support business growth?
        content: Cloud virtualization and automated IT management accelerate digital transformation so you can respond to market changes.
      - icon: lucide:terminal
        title: No budget to hire MIS talent or pay for expensive systems, leaving HR to do everything?
        content: Our professional IT hosting, outsourcing, and consulting services keep every IT-related task running smoothly.
      - icon: lucide:wifi-off
        title: Unstable network connections hurt productivity and operations?
        content: We provide professional network deployment and maintenance to keep enterprise connectivity stable and efficient.
      - icon: lucide:mail
        title: Corporate email and servers are vulnerable to malicious attacks?
        content: Our security solutions include email security gateways, firewalls, and EDR endpoint protection to safeguard your data.
  services-block:
    desktop-title: |
      We Deliver the Industry's Best Cost-Performance Services.
    mobile-title: |
      We Deliver<br>the Industry's Best<br>Cost-Performance Services.
    intro:
      - Simple automated management systems cut at least 60% of current process time.
      - Highly customizable systems adapt to every client's needs.
      - We operate the full MIS scope for you, detect network issues immediately, and keep connectivity smooth.
    message: Whatever IT challenge you face, we can recommend the right solution to keep you operating and growing smoothly.
  case-section-title: Case Studies
  tech-section-title: Tech Articles
services-section:
  services:
    - title: Comprehensive IT/MIS Hosting
      items:
        - title: IT Monitoring and Management Systems
          content: Deploy Zabbix, LibreNMS, Grafana, Graylog, and Wazuh to ensure a stable IT environment.
          pageKey: services-it-monitoring
        - title: Containerization and DevOps
          content: Build enterprise container platforms to improve development and deployment efficiency.
          pageKey: services-container-devops
    - title: Comprehensive IT/MIS Hosting - Office Networks
      items:
        - title: IT/MIS Outsourcing and Technical Support
          content: Provide end-to-end IT services to keep your IT environment stable.
          pageKey: services-it-outsourcing
        - title: Office Network Deployment and Maintenance
          content: Handle planning, build, and upkeep for Cisco, Juniper, Palo Alto, FortiGate, VyOS, and more.
          pageKey: services-office-network
    - title: Comprehensive IT/MIS Hosting - Data Center Networks
      items:
        - title: IDC Data Center Deployment and Maintenance
          content: Offer professional planning, implementation, and managed services, including remote-hands support.
          pageKey: services-idc-deployment
        - title: Virtualization and Cloud Solutions
          content: Migrate workloads to Proxmox VE, build virtualization clusters, and enable NVIDIA vGPU compute clusters.
          pageKey: services-virtualization-cloud
        - title: Website and Server Hosting Operations
          content: Deliver secure and reliable hosting and managed services.
          pageKey: services-hosting-operations
    - title: Information Security Management
      items:
        - title: Wazuh SIEM Deployment and Operations
          content: Implement and manage Wazuh SIEM to centralize log collection, detect threats, and streamline incident response.
          pageKey: services-wazuh-siem
        - title: Zero Trust Architecture Enablement
          content: Offer standalone Zero Trust options, including Jamf Security Cloud for Apple fleets, Cloudflare Zero Trust for secure access, and on-prem NetBird overlays for self-hosted environments.
          pageKey: services-zero-trust
        - title: Enterprise Backup and Security Solutions
          content: Provide Proxmox Backup Server, Proxmox Mail Gateway, and security monitoring solutions to protect critical data.
          pageKey: services-backup-security
        - title: 802.1X Authentication Deployment and Maintenance
          content: Deliver enterprise network access control to improve security and management efficiency.
          pageKey: services-8021x
        - title: VPN and Remote Security Solutions
          content: Provide OpenVPN and WireGuard to keep remote access secure.
          pageKey: services-vpn-remote
        - title: Identity and Access Management with ZITADEL
          content: Design and roll out ZITADEL-based IAM services, unifying SSO, MFA, and fine-grained access control across cloud and on-prem systems.
          pageKey: services-iam-zitadel
    - title: Asset Management
      items:
        - title: Wazuh Asset Visibility
          content: Use Wazuh agents to inventory devices, monitor software changes, and ensure endpoint compliance.
          pageKey: services-wazuh-asset
        - title: Jamf Enterprise Apple Device Management
          content: Manage Jamf Pro, Jamf Protect, Jamf Security Cloud, and on-prem Jamf Pro deployments.
          pageKey: services-jamf
    - title: Customized Product Development
      items:
        - title: Custom System Development
          content: Design and develop tailored IT solutions based on your services and business needs.
          pageKey: services-custom-dev
team-section:
  intro:
    - Our team has extensive experience across development, IT/MIS management, and project delivery.
    - We have designed large-scale enterprise IT architectures, led cloud migrations, rolled out virtualization, and implemented enterprise security.
    - We focus on enterprise IT infrastructure, cybersecurity, network architecture, and IT system development.
    - We know every MIS pain point across business operations.
    - We have built wireless networks for seminars hosting 500 to 1,500+ attendees and developed asset management systems.
    - Whether you need management systems, network deployment, or live event streaming, we can deliver.
