worker_processes auto;
events { worker_connections 1024; }
include /etc/nginx/syslog-main.conf;
error_log /dev/stderr;

http {
  include           mime.types;
  default_type      application/octet-stream;
  sendfile          on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 10G;
  include /etc/nginx/real-ip.conf;
  real_ip_recursive off;

  log_format https  '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '"$http_host" "$scheme" '
                    'h3="$http3" ssl="$ssl_protocol" ssl_ci="$ssl_cipher" '
                    'rt="$request_time" uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time" '
                    'realip_from="$realip_remote_addr" '
                    'cfip="$http_cf_connecting_ip" '
                    'xff="$http_x_forwarded_for" '
                    'cf_ray="$http_cf_ray"';
  include /etc/nginx/syslog-http.conf;
  access_log /dev/stdout https;

  map $http_accept_language $wc_lang {
    ~zh-tw zh-tw;
    ~zh zh-tw;
    ~en en;
    default zh-tw;
  }

  # helper to strip leading /<lang>
  map $uri $wc_uri_noprefix {
    ~^/(en|zh-tw)(/.*)$ $2;
    ~^/(en|zh-tw)$ /;
    default $uri;
  }

  map $uri $wc_redirect_target {
    default "";
    include /usr/share/nginx/html/.nginx-redirects*.map;
  }

  server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    error_page 404 /404/;
    location = /404/ {
      # Serve our generated 404 page (prefer non-prefixed, fall back to prefixed copies)
      try_files /404/index.html /en/404/index.html /zh-tw/404/index.html =404;
    }

    if ($wc_redirect_target != "") {
      return 301 $wc_redirect_target$is_args$args;
    }

    location = /.nginx-redirects.map {
      return 404;
    }

    # Reject malformed paths with repeated slashes
    #if ($request_uri ~ "//+") {
    #  return 404;
    #}

    # Optional prefix removal when header locale equals prefix
    location ~ ^/(en|zh-tw)(/.*)?$ {
      set $prefix $1;
      if ($prefix = $wc_lang) {
        # if locale matches, strip prefix to non-prefixed URL, preserving host/port
        return 302 $scheme://$http_host$wc_uri_noprefix;
      }
      try_files $uri $uri/ $uri/index.html =404;
    }

    # Non-prefix: negotiate by Accept-Language, fall back to default
    location / {
      # First, serve any direct matches (assets/non-prefixed outputs)
      # Then, try language-prefixed files without changing URL
      try_files $uri $uri/ $uri/index.html /$wc_lang$uri /$wc_lang$uri/ /$wc_lang$uri/index.html /$wc_lang/index.html =404;
      add_header Vary Accept-Language;
    }
  }
}
